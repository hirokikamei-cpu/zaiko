<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="在庫管理">
<title>在庫管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif}
body{background:#f5f5f5;color:#1a1a1a;padding:0 0 40px}
.app{max-width:600px;margin:0 auto;padding:12px}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #eee;margin-bottom:1rem;border-radius:12px 12px 0 0;overflow:hidden}
.tab-btn{flex:1;padding:12px 4px;border:none;background:none;cursor:pointer;font-size:12px;color:#888;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent}
.tab-btn.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:600}
.tab-btn i{font-size:19px}
.page{display:none}
.page.active{display:block}
.loc-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.loc-scroll::-webkit-scrollbar{display:none}
.loc-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:14px;color:#666;min-height:44px}
.loc-chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.loc-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.loc-chip.active .dot{background:#fff!important}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.section-header h1{font-size:17px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:7px}
.btn-add{width:44px;height:44px;border-radius:10px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.btn-add:active{opacity:.75}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#fff;border-radius:10px;padding:.75rem;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:2px}
.stat-value{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-value.warn{color:#854F0B}
.alert-bar{background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;padding:10px 12px;margin-bottom:.75rem;font-size:13px;color:#633806;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.cat-filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:.75rem;scrollbar-width:none}
.cat-filter-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:8px 14px;border-radius:16px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;color:#666;min-height:36px;display:flex;align-items:center}
.cat-group{margin-bottom:1rem}
.cat-group-header{font-size:13px;font-weight:600;color:#888;padding:6px 4px;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cat-group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.item-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.item-card.low-card{border-color:#EF9F27;background:#FFFDF7}
.item-top{display:flex;align-items:center;margin-bottom:8px}
.item-name{font-size:15px;font-weight:600;color:#1a1a1a;flex:1}
.item-bottom{display:flex;align-items:center;justify-content:space-between}
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:12px;font-weight:600}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qb{width:44px;height:44px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center}
.qb:active{background:#f0f0f0}
.qn{min-width:36px;text-align:center;font-size:17px;font-weight:600;color:#1a1a1a}
.qn.low{color:#854F0B}
.qunit{font-size:12px;color:#888}
.empty{text-align:center;color:#aaa;padding:2rem 1rem;font-size:14px}

/* 移動 */
.xfer-section{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem;margin-bottom:1rem}
.xfer-section h3{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.xfer-field{margin-bottom:8px}
.xfer-field label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.xfer-field select,.xfer-field input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;height:44px}
.btn-xfer{width:100%;height:44px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#1a1a1a;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.btn-xfer:active{opacity:.75}
.xfer-msg{font-size:13px;margin-top:8px;padding:8px;border-radius:8px;text-align:center}
.xfer-msg.ok{color:#27500A;background:#EAF3DE}
.xfer-msg.err{color:#854F0B;background:#FAEEDA}

/* 棚卸し */
.check-header{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem;margin-bottom:1rem}
.check-header h3{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.check-header p{font-size:13px;color:#888;line-height:1.5}
.check-progress{margin-top:.75rem;background:#f0f0f0;border-radius:6px;height:8px;overflow:hidden}
.check-progress-bar{height:100%;background:#1a1a1a;border-radius:6px;transition:width .3s}
.check-progress-label{font-size:11px;color:#888;margin-top:4px;text-align:right}
.check-item-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:8px}
.check-item-card.checked{border-color:#27500A;background:#F0F7EA}
.check-item-card.low-alert{border-color:#EF9F27}
.check-item-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.check-mark{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:transparent}
.check-mark.done{border-color:#27500A;background:#27500A;color:#fff}
.check-item-name{font-size:15px;font-weight:600;color:#1a1a1a;flex:1}
.check-item-body{display:flex;align-items:center;justify-content:space-between;gap:8px}
.check-current{font-size:12px;color:#888}
.check-input-wrap{display:flex;align-items:center;gap:6px}
.check-input-wrap label{font-size:12px;color:#888;white-space:nowrap}
.check-qty-ctrl{display:flex;align-items:center;gap:6px}
.cqb{width:40px;height:40px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.cqb:active{background:#f0f0f0}
.cqn{width:48px;text-align:center;padding:8px 4px;border:1px solid #ddd;border-radius:8px;font-size:16px;font-weight:600}
.check-diff{font-size:12px;font-weight:600;padding:3px 8px;border-radius:8px;white-space:nowrap}
.check-diff.plus{color:#27500A;background:#EAF3DE}
.check-diff.minus{color:#854F0B;background:#FAEEDA}
.check-diff.zero{color:#888;background:#f0f0f0}
.btn-submit{width:100%;height:52px;border-radius:12px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:1rem}
.btn-submit:active{opacity:.75}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
.btn-reset{width:100%;height:44px;border-radius:10px;background:#f5f5f5;color:#888;border:1px solid #ddd;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.send-status{font-size:13px;margin-top:8px;padding:10px;border-radius:10px;text-align:center}
.send-status.ok{color:#27500A;background:#EAF3DE}
.send-status.err{color:#854F0B;background:#FAEEDA}
.send-status.sending{color:#888;background:#f5f5f5}

/* 設定 */
.setting-section{background:#fff;border-radius:12px;border:1px solid #eee;margin-bottom:1rem;overflow:hidden}
.setting-section-title{font-size:12px;color:#888;font-weight:600;padding:12px 16px 6px;letter-spacing:0.5px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-top:1px solid #f0f0f0;gap:12px}
.setting-label{font-size:14px;color:#1a1a1a;flex:1}
.setting-sub{font-size:11px;color:#888;margin-top:2px}
.setting-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#f9f9f9;margin-top:6px}
.toggle{width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.toggle.on{background:#27500A}
.toggle.off{background:#ccc}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:white;position:absolute;top:3px}
.toggle.on .toggle-thumb{left:21px}
.toggle.off .toggle-thumb{left:3px}
.btn-setting{width:100%;height:44px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#1a1a1a;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-setting:active{opacity:.75}
.notif-status{font-size:12px;padding:8px;border-radius:8px;width:100%;text-align:center}
.notif-status.ok{color:#27500A;background:#EAF3DE}
.notif-status.err{color:#854F0B;background:#FAEEDA}
.notif-status.sending{color:#888;background:#f5f5f5}
.cat-setting-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid #f0f0f0}
.cat-color-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,0.1);cursor:pointer}
.cat-name-input{flex:1;border:none;background:none;font-size:14px;color:#1a1a1a;outline:none;padding:0}
.btn-small{padding:8px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#1a1a1a;white-space:nowrap;min-height:36px}
.btn-small.danger{color:#A32D2D;border-color:#F09595;background:#FCEBEB}
.setting-item-card{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px}
.setting-item-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.setting-item-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.setting-item-row label{font-size:11px;color:#888;width:70px;flex-shrink:0}
.setting-item-row input,.setting-item-row select{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;height:38px;background:#fff}
.loc-name-input{border:none;background:none;font-size:14px;color:#1a1a1a;flex:1;outline:none;padding:0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.field input,.field select{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;height:48px;background:#fff}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0}
.color-opt.selected{border-color:#1a1a1a}
.mact{display:flex;gap:8px;margin-top:1rem}
.mact button{flex:1;height:50px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600}
.btn-cancel{background:#f0f0f0;border:none;color:#1a1a1a}
.btn-save{background:#1a1a1a;color:#fff;border:none}
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('stock')" id="tab-stock"><i class="ti ti-package"></i>在庫</button>
    <button class="tab-btn" onclick="switchTab('check')" id="tab-check"><i class="ti ti-clipboard-check"></i>棚卸し</button>
    <button class="tab-btn" onclick="switchTab('move')" id="tab-move"><i class="ti ti-arrows-exchange"></i>移動</button>
    <button class="tab-btn" onclick="switchTab('settings')" id="tab-settings"><i class="ti ti-settings"></i>設定</button>
  </div>

  <!-- 在庫ページ -->
  <div class="page active" id="page-stock">
    <div class="loc-scroll" id="loc-scroll-stock"></div>
    <div class="section-header">
      <h1><i class="ti ti-building-store" style="font-size:17px"></i><span id="loc-name-stock"></span></h1>
      <button class="btn-add" onclick="openAdd()"><i class="ti ti-plus"></i></button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="alert-area"></div>
    <div class="cat-filter-scroll" id="cat-filter"></div>
    <div id="item-list"></div>
  </div>

  <!-- 棚卸しページ -->
  <div class="page" id="page-check">
    <div class="loc-scroll" id="loc-scroll-check"></div>
    <div class="check-header">
      <h3><i class="ti ti-clipboard-check" style="font-size:16px"></i>棚卸しチェック</h3>
      <p>実際の在庫数を入力してチェックを入れ、最後に送信してください。</p>
      <div class="check-progress"><div class="check-progress-bar" id="check-progress-bar" style="width:0%"></div></div>
      <div class="check-progress-label" id="check-progress-label">0 / 0 チェック済み</div>
    </div>
    <div id="check-list"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitCheck()" disabled><i class="ti ti-send"></i>棚卸し結果を送信</button>
    <button class="btn-reset" onclick="resetCheck()"><i class="ti ti-refresh"></i>リセット</button>
    <div id="send-status" class="send-status hidden"></div>
  </div>

  <!-- 移動ページ -->
  <div class="page" id="page-move">
    <div class="loc-scroll" id="loc-scroll-move"></div>
    <div class="xfer-section">
      <h3><i class="ti ti-arrows-exchange" style="font-size:15px"></i>拠点間在庫移動</h3>
      <div class="xfer-field"><label>商品</label><select id="xfer-item"></select></div>
      <div class="xfer-field"><label>数量</label><input type="number" id="xfer-qty" min="1" value="1" step="1" inputmode="numeric"></div>
      <div class="xfer-field"><label>移動先</label><select id="xfer-to"></select></div>
      <button class="btn-xfer" onclick="doTransfer()"><i class="ti ti-send"></i>移動する</button>
      <div id="xfer-msg" class="xfer-msg hidden"></div>
    </div>
  </div>

  <!-- 設定ページ -->
  <div class="page" id="page-settings">
    <div class="setting-section">
      <div class="setting-section-title">Google Chat 通知</div>
      <div class="setting-row" style="flex-direction:column;align-items:stretch">
        <div class="setting-label">GAS URL</div>
        <input type="url" class="setting-input" id="gas-url" placeholder="https://script.google.com/macros/s/..." oninput="saveSettings()">
      </div>
      <div class="setting-row">
        <div><div class="setting-label">低在庫アラート通知</div><div class="setting-sub">在庫が閾値以下になったとき</div></div>
        <button class="toggle on" id="toggle-low" onclick="toggleNotif('low')"><div class="toggle-thumb"></div></button>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">拠点間移動通知</div><div class="setting-sub">在庫を移動したとき</div></div>
        <button class="toggle on" id="toggle-xfer" onclick="toggleNotif('xfer')"><div class="toggle-thumb"></div></button>
      </div>
      <div class="setting-row"><button class="btn-setting" onclick="sendTest()"><i class="ti ti-send"></i>テスト通知を送る</button></div>
      <div class="setting-row hidden" id="notif-status-row"><div id="notif-status" class="notif-status"></div></div>
    </div>
    <div class="setting-section">
      <div class="setting-section-title">拠点管理</div>
      <div id="loc-settings-list"></div>
      <div class="setting-row"><button class="btn-setting" onclick="openAddLoc()"><i class="ti ti-plus"></i>拠点を追加</button></div>
    </div>
    <div class="setting-section">
      <div class="setting-section-title">カテゴリ管理</div>
      <div id="cat-settings-list"></div>
      <div class="setting-row"><button class="btn-setting" onclick="openAddCat()"><i class="ti ti-plus"></i>カテゴリを追加</button></div>
    </div>
    <div class="setting-section">
      <div class="setting-section-title">商品・在庫設定</div>
      <div class="setting-row" style="padding-bottom:8px">
        <div class="loc-scroll" id="loc-scroll-settings" style="margin:0;flex:1"></div>
      </div>
      <div style="padding:0 12px 12px">
        <div id="settings-item-list"></div>
        <button class="btn-setting" style="margin-top:8px" onclick="openAdd()"><i class="ti ti-plus"></i>商品を追加</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const DOT_COLORS=['#185FA5','#0F6E56','#854F0B','#72243E','#3C3489','#A32D2D'];
const PRESET_COLORS=['#185FA5','#0F6E56','#854F0B','#72243E','#3C3489','#A32D2D','#B85A0A','#1D9E75','#D4537E','#444441','#533AB7','#0F6E8A'];

let categories=[
  {id:'c1',name:'飲料',color:'#185FA5'},
  {id:'c2',name:'乳製品',color:'#0F6E56'},
  {id:'c3',name:'穀物',color:'#854F0B'},
  {id:'c4',name:'野菜',color:'#1D9E75'},
  {id:'c5',name:'調味料',color:'#72243E'},
  {id:'c6',name:'菓子',color:'#3C3489'},
];
let locations=[{id:'A',name:'拠点A'},{id:'B',name:'拠点B'}];
let data={
  A:[
    {id:1,name:'緑茶ペットボトル',catId:'c1',qty:48,unit:'本',thresh:10},
    {id:2,name:'牛乳',catId:'c2',qty:3,unit:'パック',thresh:5},
    {id:3,name:'コシヒカリ',catId:'c3',qty:20,unit:'kg',thresh:5},
    {id:4,name:'醤油',catId:'c5',qty:8,unit:'本',thresh:3},
    {id:5,name:'ほうれん草',catId:'c4',qty:2,unit:'束',thresh:5},
  ],
  B:[
    {id:6,name:'オレンジジュース',catId:'c1',qty:4,unit:'本',thresh:6},
    {id:7,name:'みりん',catId:'c5',qty:1,unit:'本',thresh:2},
    {id:8,name:'ポテトチップス',catId:'c6',qty:15,unit:'袋',thresh:8},
  ]
};

// 棚卸しデータ: {itemId: {checked: bool, newQty: number}}
let checkData={};

let curLoc='A',curCheckLoc='A',curSettingsLoc='A',curTab='stock',curCatFilter='all';
let nextItemId=9,nextLocCode=67,nextCatId=7;
let notifSettings={low:true,xfer:true};
let notifiedLow=new Set();
let tempColor='';

function getCat(id){return categories.find(c=>c.id===id)||{name:'不明',color:'#888'};}
function catColor(id){return getCat(id).color;}
function catName(id){return getCat(id).name;}
function textColor(bg){
  const r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>128?'#1a1a1a':'#fff';
}

function loadSettings(){
  try{
    const s=localStorage.getItem('inventory_v5');
    if(s){
      const p=JSON.parse(s);
      if(p.gasUrl)document.getElementById('gas-url').value=p.gasUrl;
      if(p.notifSettings)notifSettings=p.notifSettings;
      if(p.locations)locations=p.locations;
      if(p.data)data=p.data;
      if(p.categories)categories=p.categories;
      if(p.nextItemId)nextItemId=p.nextItemId;
      if(p.nextLocCode)nextLocCode=p.nextLocCode;
      if(p.nextCatId)nextCatId=p.nextCatId;
    }
  }catch(e){}
  updateToggles();
}

function saveSettings(){
  try{
    localStorage.setItem('inventory_v5',JSON.stringify({
      gasUrl:document.getElementById('gas-url').value,
      notifSettings,locations,data,categories,nextItemId,nextLocCode,nextCatId
    }));
  }catch(e){}
}

function updateToggles(){
  ['low','xfer'].forEach(t=>{
    const el=document.getElementById('toggle-'+t);
    if(el){el.classList.toggle('on',notifSettings[t]);el.classList.toggle('off',!notifSettings[t]);}
  });
}

function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='stock')renderStock();
  if(tab==='check'){initCheckData();renderCheck();}
  if(tab==='move')renderMove();
  if(tab==='settings')renderSettingsPage();
}

function gasUrl(){return document.getElementById('gas-url').value.trim();}

async function sendToChat(text){
  const url=gasUrl();if(!url)return false;
  try{const res=await fetch(url+'?text='+encodeURIComponent(text),{method:'GET'});return res.ok;}
  catch(e){return false;}
}

function toggleNotif(type){notifSettings[type]=!notifSettings[type];updateToggles();saveSettings();}

async function sendTest(){
  if(!gasUrl()){showNotifStatus('GAS URLを入力してください','err');return;}
  showNotifStatus('送信中...','sending');
  const ok=await sendToChat('[在庫管理] テスト通知です。');
  showNotifStatus(ok?'送信しました':'送信失敗。GAS URLを確認してください',ok?'ok':'err');
}

function showNotifStatus(msg,type){
  const el=document.getElementById('notif-status'),row=document.getElementById('notif-status-row');
  el.textContent=msg;el.className='notif-status '+type;row.classList.remove('hidden');
  if(type!=='sending')setTimeout(()=>row.classList.add('hidden'),5000);
}

async function checkLowStock(){
  if(!notifSettings.low||!gasUrl())return;
  const items=data[curLoc]||[];
  const low=items.filter(i=>i.qty<=i.thresh);
  for(const i of low){
    const key=curLoc+'-'+i.id;
    if(!notifiedLow.has(key)){
      notifiedLow.add(key);
      const loc=locations.find(l=>l.id===curLoc);
      await sendToChat(`[在庫管理] ⚠️ 低在庫アラート\n拠点：${loc.name}\n商品：${i.name}\n現在庫：${i.qty}${i.unit}（閾値：${i.thresh}${i.unit}）`);
    }
  }
  items.filter(i=>i.qty>i.thresh).forEach(i=>notifiedLow.delete(curLoc+'-'+i.id));
}

// ===== 棚卸し =====
function initCheckData(){
  const items=data[curCheckLoc]||[];
  // 既存のチェックデータを保持しつつ、新しい商品を追加
  items.forEach(i=>{
    if(!checkData[curCheckLoc])checkData[curCheckLoc]={};
    if(!checkData[curCheckLoc][i.id]){
      checkData[curCheckLoc][i.id]={checked:false,newQty:i.qty};
    }
  });
}

function switchLocCheck(id){
  curCheckLoc=id;
  initCheckData();
  renderCheck();
}

function renderCheck(){
  renderLocChips('loc-scroll-check',curCheckLoc,'switchLocCheck');
  const items=data[curCheckLoc]||[];
  if(!checkData[curCheckLoc])checkData[curCheckLoc]={};
  const cd=checkData[curCheckLoc];
  const checkedCount=items.filter(i=>cd[i.id]&&cd[i.id].checked).length;
  const total=items.length;
  const pct=total>0?Math.round(checkedCount/total*100):0;
  document.getElementById('check-progress-bar').style.width=pct+'%';
  document.getElementById('check-progress-label').textContent=`${checkedCount} / ${total} チェック済み`;
  const submitBtn=document.getElementById('btn-submit');
  submitBtn.disabled=checkedCount===0;

  const cl=document.getElementById('check-list');
  if(!items.length){cl.innerHTML=`<div class="empty">商品がありません</div>`;return;}

  // カテゴリグループ
  const groups={};
  items.forEach(i=>{if(!groups[i.catId])groups[i.catId]=[];groups[i.catId].push(i);});

  cl.innerHTML=Object.entries(groups).map(([catId,its])=>{
    const cat=getCat(catId);
    return `<div class="cat-group">
      <div class="cat-group-header">
        <span class="cat-group-dot" style="background:${cat.color}"></span>${cat.name}
      </div>
      ${its.map(i=>{
        const d=cd[i.id]||{checked:false,newQty:i.qty};
        const diff=d.newQty-i.qty;
        const diffClass=diff>0?'plus':diff<0?'minus':'zero';
        const diffStr=diff>0?'+'+diff:diff===0?'±0':String(diff);
        return `<div class="check-item-card${d.checked?' checked':''}${i.qty<=i.thresh?' low-alert':''}" id="cic-${i.id}">
          <div class="check-item-top">
            <div class="check-mark${d.checked?' done':''}" onclick="toggleCheck(${i.id})">${d.checked?'✓':''}</div>
            <span class="check-item-name">${i.name}</span>
            <span class="badge" style="background:${cat.color};color:${textColor(cat.color)};flex-shrink:0">${cat.name}</span>
          </div>
          <div class="check-item-body">
            <div class="check-current">現在庫：${i.qty}${i.unit}</div>
            <div class="check-input-wrap">
              <label>実数：</label>
              <div class="check-qty-ctrl">
                <button class="cqb" onclick="changeCheckQty(${i.id},-1)">−</button>
                <input class="cqn" type="number" min="0" value="${d.newQty}" inputmode="numeric" onchange="setCheckQty(${i.id},parseInt(this.value)||0)" id="cqn-${i.id}">
                <button class="cqb" onclick="changeCheckQty(${i.id},1)">＋</button>
              </div>
              <span class="check-diff ${diffClass}" id="cdiff-${i.id}">${diffStr}${i.unit}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function toggleCheck(id){
  if(!checkData[curCheckLoc])checkData[curCheckLoc]={};
  const d=checkData[curCheckLoc][id]||{checked:false,newQty:(data[curCheckLoc]||[]).find(i=>i.id===id)?.qty||0};
  d.checked=!d.checked;
  checkData[curCheckLoc][id]=d;
  renderCheck();
}

function changeCheckQty(id,delta){
  if(!checkData[curCheckLoc])checkData[curCheckLoc]={};
  const item=(data[curCheckLoc]||[]).find(i=>i.id===id);
  if(!item)return;
  const d=checkData[curCheckLoc][id]||{checked:false,newQty:item.qty};
  d.newQty=Math.max(0,(d.newQty||0)+delta);
  checkData[curCheckLoc][id]=d;
  const inp=document.getElementById('cqn-'+id);
  if(inp)inp.value=d.newQty;
  updateCheckDiff(id,item);
  updateCheckProgress();
}

function setCheckQty(id,val){
  if(!checkData[curCheckLoc])checkData[curCheckLoc]={};
  const item=(data[curCheckLoc]||[]).find(i=>i.id===id);
  if(!item)return;
  const d=checkData[curCheckLoc][id]||{checked:false,newQty:item.qty};
  d.newQty=Math.max(0,val);
  checkData[curCheckLoc][id]=d;
  updateCheckDiff(id,item);
}

function updateCheckDiff(id,item){
  const d=checkData[curCheckLoc][id];
  const diff=d.newQty-item.qty;
  const diffClass=diff>0?'plus':diff<0?'minus':'zero';
  const diffStr=diff>0?'+'+diff:diff===0?'±0':String(diff);
  const el=document.getElementById('cdiff-'+id);
  if(el){el.className='check-diff '+diffClass;el.textContent=diffStr+item.unit;}
}

function updateCheckProgress(){
  const items=data[curCheckLoc]||[];
  const cd=checkData[curCheckLoc]||{};
  const checkedCount=items.filter(i=>cd[i.id]&&cd[i.id].checked).length;
  const total=items.length;
  const pct=total>0?Math.round(checkedCount/total*100):0;
  document.getElementById('check-progress-bar').style.width=pct+'%';
  document.getElementById('check-progress-label').textContent=`${checkedCount} / ${total} チェック済み`;
  document.getElementById('btn-submit').disabled=checkedCount===0;
}

async function submitCheck(){
  const items=data[curCheckLoc]||[];
  const cd=checkData[curCheckLoc]||{};
  const loc=locations.find(l=>l.id===curCheckLoc);
  const checkedItems=items.filter(i=>cd[i.id]&&cd[i.id].checked);
  if(!checkedItems.length){alert('チェックされた商品がありません');return;}

  const now=new Date();
  const dateStr=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  let msg=`📦 棚卸し報告\n拠点：${loc.name}\n日時：${dateStr}\n${'─'.repeat(20)}\n`;
  let hasChange=false;
  checkedItems.forEach(i=>{
    const d=cd[i.id];
    const diff=d.newQty-i.qty;
    const diffStr=diff>0?`(+${diff})`:diff<0?`(${diff})`:'(変化なし)';
    if(diff!==0)hasChange=true;
    const alert=d.newQty<=i.thresh?'⚠️ ':''
    msg+=`${alert}${i.name}：${i.qty}${i.unit} → ${d.newQty}${i.unit} ${diffStr}\n`;
  });
  if(hasChange){
    msg+=`${'─'.repeat(20)}\n`;
    const changed=checkedItems.filter(i=>cd[i.id].newQty!==i.qty);
    msg+=`変動あり：${changed.length}件`;
  }
  const lowItems=checkedItems.filter(i=>cd[i.id].newQty<=i.thresh);
  if(lowItems.length>0){
    msg+=`\n⚠️ 低在庫：${lowItems.map(i=>i.name).join('、')}`;
  }

  const statusEl=document.getElementById('send-status');
  statusEl.textContent='送信中...';statusEl.className='send-status sending';statusEl.classList.remove('hidden');

  // 在庫を更新
  checkedItems.forEach(i=>{
    const d=cd[i.id];
    i.qty=d.newQty;
    if(d.newQty>i.thresh)notifiedLow.delete(curCheckLoc+'-'+i.id);
  });
  saveSettings();

  if(gasUrl()){
    const ok=await sendToChat(msg);
    statusEl.textContent=ok?'送信しました！在庫を更新しました':'通知の送信に失敗しました（在庫は更新済み）';
    statusEl.className='send-status '+(ok?'ok':'err');
  } else {
    statusEl.textContent='在庫を更新しました（GAS URLが未設定のため通知はスキップ）';
    statusEl.className='send-status ok';
  }

  // チェックデータをリセット
  checkData[curCheckLoc]={};
  setTimeout(()=>{renderCheck();statusEl.classList.add('hidden');renderStock();},3000);
}

function resetCheck(){
  if(confirm('チェック内容をリセットしますか？')){
    checkData[curCheckLoc]={};
    initCheckData();
    renderCheck();
  }
}

// ===== 在庫 =====
function renderLocChips(containerId,cur,fn){
  const bar=document.getElementById(containerId);if(!bar)return;
  bar.innerHTML=locations.map((l,i)=>`
    <button class="loc-chip${l.id===cur?' active':''}" onclick="${fn}('${l.id}')">
      <span class="dot" style="background:${l.id===cur?'#fff':DOT_COLORS[i%DOT_COLORS.length]}"></span>${l.name}
    </button>`).join('');
}

function switchLocStock(id){curLoc=id;curCatFilter='all';renderStock();}
function switchLocMove(id){curLoc=id;renderMove();}
function switchLocSettings(id){curSettingsLoc=id;renderSettingsItems();}

function renderCatFilter(){
  const el=document.getElementById('cat-filter');
  const items=data[curLoc]||[];
  const usedCatIds=[...new Set(items.map(i=>i.catId))];
  const usedCats=categories.filter(c=>usedCatIds.includes(c.id));
  el.innerHTML=`<button class="cat-chip" style="${curCatFilter==='all'?'background:#1a1a1a;color:#fff;border-color:#1a1a1a':''}" onclick="setCatFilter('all')">すべて</button>`
    +usedCats.map(c=>{
      const active=curCatFilter===c.id;
      return `<button class="cat-chip" style="background:${active?c.color:'#fff'};color:${active?textColor(c.color):'#666'};border-color:${active?c.color:'#ddd'}" onclick="setCatFilter('${c.id}')">${c.name}</button>`;
    }).join('');
}

function setCatFilter(id){curCatFilter=id;renderStock();}

function renderStock(){
  renderLocChips('loc-scroll-stock',curLoc,'switchLocStock');
  document.getElementById('loc-name-stock').textContent=locations.find(l=>l.id===curLoc).name;
  const items=data[curLoc]||[];
  const low=items.filter(i=>i.qty<=i.thresh);
  const total=items.reduce((s,i)=>s+i.qty,0);
  const cats=new Set(items.map(i=>i.catId));
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">商品数</div><div class="stat-value">${items.length}</div></div>
    <div class="stat"><div class="stat-label">総在庫数</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">カテゴリ数</div><div class="stat-value">${cats.size}</div></div>
    <div class="stat"><div class="stat-label">低在庫</div><div class="stat-value${low.length>0?' warn':''}">${low.length}</div></div>`;
  document.getElementById('alert-area').innerHTML=low.length>0
    ?`<div class="alert-bar"><i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0;margin-top:1px"></i><span>低在庫：${low.map(i=>i.name).join('、')}</span></div>`:'';
  renderCatFilter();
  const filtered=curCatFilter==='all'?items:items.filter(i=>i.catId===curCatFilter);
  const il=document.getElementById('item-list');
  if(!filtered.length){il.innerHTML=`<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px"></i>該当する商品がありません</div>`;return;}
  if(curCatFilter==='all'){
    const groups={};
    filtered.forEach(i=>{if(!groups[i.catId])groups[i.catId]=[];groups[i.catId].push(i);});
    il.innerHTML=Object.entries(groups).map(([catId,its])=>{
      const cat=getCat(catId);
      return `<div class="cat-group"><div class="cat-group-header"><span class="cat-group-dot" style="background:${cat.color}"></span>${cat.name}</div>${its.map(i=>itemCardHTML(i)).join('')}</div>`;
    }).join('');
  } else {
    il.innerHTML=filtered.map(i=>itemCardHTML(i)).join('');
  }
}

function itemCardHTML(i){
  const isLow=i.qty<=i.thresh;
  const cat=getCat(i.catId);
  const tc=textColor(cat.color);
  return `<div class="item-card${isLow?' low-card':''}" style="margin-bottom:8px">
    <div class="item-top"><span class="item-name">${i.name}${isLow?` <i class="ti ti-alert-triangle" style="color:#854F0B;font-size:13px"></i>`:''}</span></div>
    <div class="item-bottom">
      <span class="badge" style="background:${cat.color};color:${tc}">${cat.name}</span>
      <div class="qty-ctrl">
        <button class="qb" onclick="changeQty(${i.id},-1)">−</button>
        <span class="qn${isLow?' low':''}">${i.qty}</span>
        <span class="qunit">${i.unit}</span>
        <button class="qb" onclick="changeQty(${i.id},1)">＋</button>
      </div>
    </div>
  </div>`;
}

function renderMove(){
  renderLocChips('loc-scroll-move',curLoc,'switchLocMove');
  const items=data[curLoc]||[];
  const others=locations.filter(l=>l.id!==curLoc);
  const xi=document.getElementById('xfer-item');
  const prev=xi.value;
  xi.innerHTML=items.length>0?items.map(i=>`<option value="${i.id}">${i.name}</option>`).join(''):'<option>（商品なし）</option>';
  if(items.find(i=>String(i.id)===prev))xi.value=prev;
  document.getElementById('xfer-to').innerHTML=others.length>0?others.map(l=>`<option value="${l.id}">${l.name}</option>`).join(''):'<option>（他の拠点なし）</option>';
}

function renderSettingsPage(){
  document.getElementById('loc-settings-list').innerHTML=locations.map((l,i)=>`
    <div class="setting-row">
      <span style="width:10px;height:10px;border-radius:50%;background:${DOT_COLORS[i%DOT_COLORS.length]};flex-shrink:0;display:inline-block"></span>
      <input class="loc-name-input" type="text" value="${l.name}" onchange="renameLocFromSettings('${l.id}',this.value)" style="margin-left:8px">
      ${locations.length>1?`<button class="btn-small danger" onclick="deleteLoc('${l.id}')">削除</button>`:''}
    </div>`).join('');
  renderCatSettings();
  renderLocChips('loc-scroll-settings',curSettingsLoc,'switchLocSettings');
  renderSettingsItems();
}

function renderCatSettings(){
  document.getElementById('cat-settings-list').innerHTML=categories.map(c=>`
    <div class="cat-setting-row">
      <div class="cat-color-dot" style="background:${c.color}" onclick="openEditCat('${c.id}')"></div>
      <input class="cat-name-input" type="text" value="${c.name}" onchange="renameCat('${c.id}',this.value)">
      ${categories.length>1?`<button class="btn-small danger" onclick="deleteCat('${c.id}')">削除</button>`:''}
    </div>`).join('');
}

function renameCat(id,name){
  const c=categories.find(x=>x.id===id);
  if(c&&name.trim()){c.name=name.trim();saveSettings();renderStock();}
}

function deleteCat(id){
  const inUse=Object.values(data).flat().some(i=>i.catId===id);
  if(inUse){alert('このカテゴリは商品に使用されています。先に商品のカテゴリを変更してください。');return;}
  if(!confirm('このカテゴリを削除しますか？'))return;
  categories=categories.filter(c=>c.id!==id);
  saveSettings();renderCatSettings();renderStock();
}

function renderSettingsItems(){
  renderLocChips('loc-scroll-settings',curSettingsLoc,'switchLocSettings');
  const items=data[curSettingsLoc]||[];
  const el=document.getElementById('settings-item-list');
  if(!items.length){el.innerHTML=`<div class="empty" style="padding:1rem 0">商品がありません</div>`;return;}
  el.innerHTML=items.map(i=>`
    <div class="setting-item-card">
      <div class="setting-item-name">
        <span class="badge" style="background:${catColor(i.catId)};color:${textColor(catColor(i.catId))}">${catName(i.catId)}</span>${i.name}
        <button class="btn-small danger" style="margin-left:auto" onclick="deleteItemFromSettings('${curSettingsLoc}',${i.id})">削除</button>
      </div>
      <div class="setting-item-row"><label>商品名</label><input type="text" value="${i.name}" onchange="updateItemField('${curSettingsLoc}',${i.id},'name',this.value)"></div>
      <div class="setting-item-row"><label>カテゴリ</label>
        <select onchange="updateItemField('${curSettingsLoc}',${i.id},'catId',this.value)">
          ${categories.map(c=>`<option value="${c.id}"${c.id===i.catId?' selected':''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div class="setting-item-row"><label>単位</label><input type="text" value="${i.unit}" onchange="updateItemField('${curSettingsLoc}',${i.id},'unit',this.value)"></div>
      <div class="setting-item-row"><label>低在庫閾値</label><input type="number" value="${i.thresh}" min="0" inputmode="numeric" onchange="updateItemField('${curSettingsLoc}',${i.id},'thresh',parseInt(this.value)||0)"></div>
    </div>`).join('');
}

function updateItemField(locId,itemId,field,value){
  const item=(data[locId]||[]).find(i=>i.id===itemId);
  if(item){item[field]=value;saveSettings();renderStock();if(curTab==='settings')renderSettingsItems();}
}

function renameLocFromSettings(id,name){
  const loc=locations.find(l=>l.id===id);
  if(loc&&name.trim()){loc.name=name.trim();saveSettings();renderStock();renderMove();}
}

function deleteItemFromSettings(locId,id){
  if(confirm('この商品を削除しますか？')){
    data[locId]=(data[locId]||[]).filter(i=>i.id!==id);
    saveSettings();renderSettingsItems();renderStock();
  }
}

async function changeQty(id,delta){
  const item=(data[curLoc]||[]).find(i=>i.id===id);
  if(item){item.qty=Math.max(0,item.qty+delta);saveSettings();renderStock();await checkLowStock();}
}

async function doTransfer(){
  const itemId=parseInt(document.getElementById('xfer-item').value);
  const qty=Math.max(1,parseInt(document.getElementById('xfer-qty').value)||1);
  const toId=document.getElementById('xfer-to').value;
  const src=(data[curLoc]||[]).find(i=>i.id===itemId);
  if(!src){showXferMsg('商品を選択してください','err');return;}
  if(src.qty<qty){showXferMsg(`在庫不足（現在：${src.qty}${src.unit}）`,'err');return;}
  src.qty-=qty;
  if(!data[toId])data[toId]=[];
  const dst=data[toId].find(i=>i.name===src.name&&i.catId===src.catId);
  if(dst){dst.qty+=qty;}else{data[toId].push({id:nextItemId++,name:src.name,catId:src.catId,qty,unit:src.unit,thresh:src.thresh});}
  const toLoc=locations.find(l=>l.id===toId);
  const fromLoc=locations.find(l=>l.id===curLoc);
  showXferMsg(`${src.name} を ${qty}${src.unit} ${toLoc.name}へ移動しました`,'ok');
  if(notifSettings.xfer)await sendToChat(`[在庫管理] 🔄 拠点間移動\n${fromLoc.name} → ${toLoc.name}\n商品：${src.name}　数量：${qty}${src.unit}`);
  saveSettings();renderMove();await checkLowStock();
}

function showXferMsg(msg,type){
  const el=document.getElementById('xfer-msg');
  el.textContent=msg;el.className='xfer-msg '+type;el.classList.remove('hidden');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.add('hidden'),3500);
}

function deleteLoc(id){
  if(locations.length<=1){alert('拠点は最低1つ必要です');return;}
  const l=locations.find(x=>x.id===id);
  const cnt=(data[id]||[]).length;
  if(!confirm(cnt>0?`「${l.name}」に${cnt}件の商品があります。削除しますか？`:`「${l.name}」を削除しますか？`))return;
  locations=locations.filter(x=>x.id!==id);delete data[id];
  if(curLoc===id)curLoc=locations[0].id;
  if(curCheckLoc===id)curCheckLoc=locations[0].id;
  if(curSettingsLoc===id)curSettingsLoc=locations[0].id;
  saveSettings();renderSettingsPage();renderStock();renderMove();
}

function colorPickerHTML(selectedColor){
  return `<div class="color-picker-row">${PRESET_COLORS.map(c=>`<div class="color-opt${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('')}</div>`;
}

function selectColor(c){
  tempColor=c;
  document.querySelectorAll('.color-opt').forEach(el=>{
    const elColor=el.style.backgroundColor;
    const hex='#'+[...Array(3)].map((_,i)=>parseInt(elColor.match(/\d+/g)[i]).toString(16).padStart(2,'0')).join('');
    el.classList.toggle('selected',hex===c);
  });
}

function openAdd(){
  document.getElementById('modal-inner').innerHTML=`<h2>商品を追加</h2>
    <div class="field"><label>商品名</label><input type="text" id="m-name" value=""></div>
    <div class="field"><label>カテゴリ</label><select id="m-cat">${categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
    <div class="field"><label>在庫数</label><input type="number" id="m-qty" min="0" value="0" inputmode="numeric"></div>
    <div class="field"><label>単位</label><input type="text" id="m-unit" value="個"></div>
    <div class="field"><label>低在庫アラート閾値</label><input type="number" id="m-thresh" min="0" value="5" inputmode="numeric"></div>
    <div class="mact"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveItem()">保存</button></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function openAddLoc(){
  document.getElementById('modal-inner').innerHTML=`<h2>拠点を追加</h2>
    <div class="field"><label>拠点名</label><input type="text" id="m-locname" placeholder="例：拠点C、東京倉庫"></div>
    <div class="mact"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveLoc()">追加</button></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function openAddCat(){
  tempColor=PRESET_COLORS[categories.length%PRESET_COLORS.length];
  document.getElementById('modal-inner').innerHTML=`<h2>カテゴリを追加</h2>
    <div class="field"><label>カテゴリ名</label><input type="text" id="m-catname" placeholder="例：冷凍食品"></div>
    <div class="field"><label>カラー</label>${colorPickerHTML(tempColor)}</div>
    <div class="mact"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveCat()">追加</button></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function openEditCat(id){
  const c=categories.find(x=>x.id===id);
  tempColor=c.color;
  document.getElementById('modal-inner').innerHTML=`<h2>カテゴリを編集</h2>
    <div class="field"><label>カテゴリ名</label><input type="text" id="m-catname" value="${c.name}"></div>
    <div class="field"><label>カラー</label>${colorPickerHTML(c.color)}</div>
    <div class="mact"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="updateCat('${id}')">保存</button></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function overlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function saveItem(){
  const name=(document.getElementById('m-name').value||'').trim();
  if(!name){alert('商品名を入力してください');return;}
  const targetLoc=curTab==='settings'?curSettingsLoc:curLoc;
  const obj={id:nextItemId++,name,catId:document.getElementById('m-cat').value,qty:Math.max(0,parseInt(document.getElementById('m-qty').value)||0),unit:document.getElementById('m-unit').value||'個',thresh:Math.max(0,parseInt(document.getElementById('m-thresh').value)||0)};
  if(!data[targetLoc])data[targetLoc]=[];
  data[targetLoc].push(obj);
  saveSettings();closeModal();
  if(curTab==='settings')renderSettingsItems();
  renderStock();
}

function saveLoc(){
  const name=(document.getElementById('m-locname').value||'').trim();
  if(!name){alert('拠点名を入力してください');return;}
  const id=String.fromCharCode(nextLocCode++);
  locations.push({id,name});data[id]=[];
  saveSettings();closeModal();renderSettingsPage();renderStock();renderMove();
}

function saveCat(){
  const name=(document.getElementById('m-catname').value||'').trim();
  if(!name){alert('カテゴリ名を入力してください');return;}
  categories.push({id:'c'+(nextCatId++),name,color:tempColor});
  saveSettings();closeModal();renderCatSettings();renderStock();
}

function updateCat(id){
  const name=(document.getElementById('m-catname').value||'').trim();
  if(!name){alert('カテゴリ名を入力してください');return;}
  const c=categories.find(x=>x.id===id);
  if(c){c.name=name;c.color=tempColor;}
  saveSettings();closeModal();renderCatSettings();renderStock();if(curTab==='settings')renderSettingsItems();
}

loadSettings();
renderStock();
</script>
</body>
</html>
