<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="在庫管理">
<title>在庫管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif}
body{background:#f5f5f5;color:#1a1a1a;padding:0 0 40px}
.app{max-width:600px;margin:0 auto;padding:12px}
.loc-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.loc-scroll::-webkit-scrollbar{display:none}
.loc-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:14px;color:#666;min-height:44px}
.loc-chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.loc-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.loc-chip.active .dot{background:#fff!important}
.loc-chip .x{font-size:16px;opacity:.6;margin-left:2px;padding:0 4px}
.chip-add{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:10px 14px;border-radius:20px;border:1px dashed #bbb;background:none;cursor:pointer;font-size:14px;color:#888;min-height:44px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.section-header h1{font-size:17px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:7px}
.btn-add{width:44px;height:44px;border-radius:10px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.btn-add:active{opacity:.75}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#fff;border-radius:10px;padding:.75rem;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:2px}
.stat-value{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-value.warn{color:#854F0B}
.alert-bar{background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;padding:10px 12px;margin-bottom:.75rem;font-size:13px;color:#633806;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.notif-section{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem;margin-bottom:1rem}
.notif-section h3{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.notif-field{margin-bottom:10px}
.notif-field label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.notif-field input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#f9f9f9}
.notif-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.notif-label{font-size:13px;color:#1a1a1a}
.notif-sub{font-size:11px;color:#888;margin-top:1px}
.toggle{width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle.on{background:#27500A}
.toggle.off{background:#ccc}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:white;position:absolute;top:3px;transition:left .2s}
.toggle.on .toggle-thumb{left:21px}
.toggle.off .toggle-thumb{left:3px}
.btn-test{width:100%;height:44px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#1a1a1a;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.btn-test:active{opacity:.75}
.notif-status{font-size:12px;margin-top:8px;text-align:center;padding:6px;border-radius:8px}
.notif-status.ok{color:#27500A;background:#EAF3DE}
.notif-status.err{color:#854F0B;background:#FAEEDA}
.notif-status.sending{color:#888;background:#f5f5f5}
.xfer-section{background:#fff;border:1px solid #eee;border-radius:12px;padding:1rem;margin-bottom:1rem}
.xfer-section h3{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.xfer-field{margin-bottom:8px}
.xfer-field label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.xfer-field select,.xfer-field input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;height:44px}
.btn-xfer{width:100%;height:44px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#1a1a1a;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.btn-xfer:active{opacity:.75}
.xfer-msg{font-size:13px;margin-top:8px;padding:8px;border-radius:8px;text-align:center}
.xfer-msg.ok{color:#27500A;background:#EAF3DE}
.xfer-msg.err{color:#854F0B;background:#FAEEDA}
.search-row{display:flex;gap:8px;margin-bottom:.75rem}
.search-row input{flex:1;min-width:0;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;height:44px}
.search-row select{width:110px;flex-shrink:0;padding:10px 6px;border:1px solid #ddd;border-radius:10px;font-size:13px;height:44px;background:#fff}
.item-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.item-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 14px}
.item-card.low-card{border-color:#EF9F27;background:#FFFDF7}
.item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.item-name{font-size:15px;font-weight:600;color:#1a1a1a;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-actions{display:flex;gap:4px;flex-shrink:0}
.action-btn{width:36px;height:36px;border:1px solid #eee;border-radius:8px;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#888}
.action-btn:active{opacity:.7}
.item-bottom{display:flex;align-items:center;justify-content:space-between}
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:12px;font-weight:600}
.b飲料{background:#E6F1FB;color:#0C447C}
.b乳製品{background:#EAF3DE;color:#27500A}
.b穀物{background:#FAEEDA;color:#633806}
.b野菜{background:#E1F5EE;color:#085041}
.b調味料{background:#FBEAF0;color:#72243E}
.b菓子{background:#EEEDFE;color:#3C3489}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qb{width:40px;height:40px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.qb:active{background:#f0f0f0}
.qn{min-width:36px;text-align:center;font-size:17px;font-weight:600;color:#1a1a1a}
.qn.low{color:#854F0B}
.qunit{font-size:12px;color:#888}
.empty{text-align:center;color:#aaa;padding:2rem 1rem;font-size:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.field input,.field select{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;height:48px;background:#fff}
.mact{display:flex;gap:8px;margin-top:1rem}
.mact button{flex:1;height:50px;border-radius:12px;cursor:pointer;font-size:15px;font-weight:600}
.btn-cancel{background:#f0f0f0;border:none;color:#1a1a1a}
.btn-save{background:#1a1a1a;color:#fff;border:none}
.btn-cancel:active,.btn-save:active{opacity:.75}
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="loc-scroll" id="loc-scroll"></div>
  <div class="section-header">
    <h1><i class="ti ti-building-store" style="font-size:17px"></i><span id="loc-name"></span></h1>
    <button class="btn-add" onclick="openAdd()" aria-label="商品を追加"><i class="ti ti-plus"></i></button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="alert-area"></div>

  <div class="notif-section">
    <h3><i class="ti ti-brand-google" style="font-size:15px"></i>Google Chat 通知設定</h3>
    <div class="notif-field">
      <label>GAS URL</label>
      <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/..." oninput="saveSettings()">
    </div>
    <div>
      <div class="notif-row">
        <div>
          <div class="notif-label">低在庫アラート通知</div>
          <div class="notif-sub">在庫が閾値以下になったとき</div>
        </div>
        <button class="toggle on" id="toggle-low" onclick="toggleNotif('low')"><div class="toggle-thumb"></div></button>
      </div>
      <div class="notif-row" style="margin-top:10px">
        <div>
          <div class="notif-label">拠点間移動通知</div>
          <div class="notif-sub">在庫を移動したとき</div>
        </div>
        <button class="toggle on" id="toggle-xfer" onclick="toggleNotif('xfer')"><div class="toggle-thumb"></div></button>
      </div>
    </div>
    <button class="btn-test" onclick="sendTest()"><i class="ti ti-send"></i>テスト通知を送る</button>
    <div id="notif-status" class="notif-status hidden"></div>
  </div>

  <div class="xfer-section hidden" id="xfer-section">
    <h3><i class="ti ti-arrows-exchange" style="font-size:15px"></i>拠点間移動</h3>
    <div class="xfer-field"><label>商品</label><select id="xfer-item"></select></div>
    <div class="xfer-field"><label>数量</label><input type="number" id="xfer-qty" min="1" value="1" step="1" inputmode="numeric"></div>
    <div class="xfer-field"><label>移動先</label><select id="xfer-to"></select></div>
    <button class="btn-xfer" onclick="doTransfer()"><i class="ti ti-send"></i>移動する</button>
    <div id="xfer-msg" class="xfer-msg hidden"></div>
  </div>

  <div class="search-row">
    <input type="text" id="search" placeholder="商品名で検索..." oninput="render()">
    <select id="filter-cat" onchange="render()">
      <option value="">すべて</option>
      <option>飲料</option><option>乳製品</option><option>穀物</option>
      <option>野菜</option><option>調味料</option><option>菓子</option>
    </select>
  </div>
  <div class="item-list" id="item-list"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const DOT_COLORS=['#185FA5','#0F6E56','#854F0B','#72243E','#3C3489','#A32D2D'];
const CATS=['飲料','乳製品','穀物','野菜','調味料','菓子'];

let locations=[{id:'A',name:'拠点A'},{id:'B',name:'拠点B'}];
let data={
  A:[
    {id:1,name:'緑茶ペットボトル',cat:'飲料',qty:48,unit:'本',thresh:10},
    {id:2,name:'牛乳',cat:'乳製品',qty:3,unit:'パック',thresh:5},
    {id:3,name:'コシヒカリ',cat:'穀物',qty:20,unit:'kg',thresh:5},
    {id:4,name:'醤油',cat:'調味料',qty:8,unit:'本',thresh:3},
    {id:5,name:'ほうれん草',cat:'野菜',qty:2,unit:'束',thresh:5},
  ],
  B:[
    {id:6,name:'オレンジジュース',cat:'飲料',qty:4,unit:'本',thresh:6},
    {id:7,name:'みりん',cat:'調味料',qty:1,unit:'本',thresh:2},
    {id:8,name:'ポテトチップス',cat:'菓子',qty:15,unit:'袋',thresh:8},
  ]
};
let curLoc='A';
let editId=null;
let nextItemId=9;
let nextLocCode=67;
let notifSettings={low:true,xfer:true};
let notifiedLow=new Set();

function loadSettings(){
  try{
    const s=localStorage.getItem('inventory_settings');
    if(s){
      const p=JSON.parse(s);
      if(p.gasUrl)document.getElementById('gas-url').value=p.gasUrl;
      if(p.notifSettings)notifSettings=p.notifSettings;
      if(p.locations)locations=p.locations;
      if(p.data)data=p.data;
      if(p.nextItemId)nextItemId=p.nextItemId;
      if(p.nextLocCode)nextLocCode=p.nextLocCode;
    }
  }catch(e){}
  const tl=document.getElementById('toggle-low');
  const tx=document.getElementById('toggle-xfer');
  tl.classList.toggle('on',notifSettings.low);tl.classList.toggle('off',!notifSettings.low);
  tx.classList.toggle('on',notifSettings.xfer);tx.classList.toggle('off',!notifSettings.xfer);
}

function saveSettings(){
  try{
    localStorage.setItem('inventory_settings',JSON.stringify({
      gasUrl:document.getElementById('gas-url').value,
      notifSettings,locations,data,nextItemId,nextLocCode
    }));
  }catch(e){}
}

function gasUrl(){return document.getElementById('gas-url').value.trim();}

async function sendToChat(text){
  const url=gasUrl();
  if(!url)return false;
  try{
    const res=await fetch(url+'?text='+encodeURIComponent(text),{method:'GET'});
    return res.ok;
  }catch(e){return false;}
}

function toggleNotif(type){
  notifSettings[type]=!notifSettings[type];
  const el=document.getElementById('toggle-'+type);
  el.classList.toggle('on',notifSettings[type]);
  el.classList.toggle('off',!notifSettings[type]);
  saveSettings();
}

async function sendTest(){
  const url=gasUrl();
  if(!url){showNotifStatus('GAS URLを入力してください','err');return;}
  showNotifStatus('送信中...','sending');
  const ok=await sendToChat('[在庫管理] テスト通知です。Google Chat連携が正常に動作しています。');
  showNotifStatus(ok?'送信しました。Google Chatを確認してください':'送信失敗。GAS URLを確認してください',ok?'ok':'err');
}

function showNotifStatus(msg,type){
  const el=document.getElementById('notif-status');
  el.textContent=msg;el.className='notif-status '+type;el.classList.remove('hidden');
  if(type!=='sending')setTimeout(()=>el.classList.add('hidden'),5000);
}

async function checkLowStock(){
  if(!notifSettings.low||!gasUrl())return;
  const low=curItems().filter(i=>i.qty<=i.thresh);
  for(const i of low){
    const key=curLoc+'-'+i.id;
    if(!notifiedLow.has(key)){
      notifiedLow.add(key);
      const loc=locations.find(l=>l.id===curLoc);
      await sendToChat(`[在庫管理] 低在庫アラート\n拠点：${loc.name}\n商品：${i.name}\n現在庫：${i.qty}${i.unit}（閾値：${i.thresh}${i.unit}）`);
    }
  }
  curItems().filter(i=>i.qty>i.thresh).forEach(i=>notifiedLow.delete(curLoc+'-'+i.id));
}

function curItems(){return data[curLoc]||[];}
function dotColor(i){return DOT_COLORS[i%DOT_COLORS.length];}

function renderLocBar(){
  const bar=document.getElementById('loc-scroll');
  bar.innerHTML=locations.map((l,i)=>`
    <button class="loc-chip${l.id===curLoc?' active':''}" onclick="switchLoc('${l.id}')">
      <span class="dot" style="background:${l.id===curLoc?'#fff':dotColor(i)}"></span>
      ${l.name}
      ${locations.length>1?`<span class="x" onclick="event.stopPropagation();deleteLoc('${l.id}')">×</span>`:''}
    </button>
  `).join('')+`<button class="chip-add" onclick="openAddLoc()"><i class="ti ti-plus"></i>追加</button>`;
}

function switchLoc(id){
  curLoc=id;
  document.getElementById('loc-name').textContent=locations.find(l=>l.id===id).name;
  document.getElementById('search').value='';
  document.getElementById('filter-cat').value='';
  hideXferMsg();
  renderLocBar();render();
}

function deleteLoc(id){
  if(locations.length<=1){alert('拠点は最低1つ必要です');return;}
  const l=locations.find(x=>x.id===id);
  const cnt=(data[id]||[]).length;
  if(!confirm(cnt>0?`「${l.name}」に${cnt}件の商品があります。削除しますか？`:`「${l.name}」を削除しますか？`))return;
  locations=locations.filter(x=>x.id!==id);
  delete data[id];
  if(curLoc===id)curLoc=locations[0].id;
  saveSettings();renderLocBar();switchLoc(curLoc);
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fc=document.getElementById('filter-cat').value;
  const list=curItems().filter(i=>(!q||i.name.toLowerCase().includes(q))&&(!fc||i.cat===fc));
  const low=curItems().filter(i=>i.qty<=i.thresh);
  const total=curItems().reduce((s,i)=>s+i.qty,0);
  const cats=new Set(curItems().map(i=>i.cat));

  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">商品数</div><div class="stat-value">${curItems().length}</div></div>
    <div class="stat"><div class="stat-label">総在庫数</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">カテゴリ数</div><div class="stat-value">${cats.size}</div></div>
    <div class="stat"><div class="stat-label">低在庫</div><div class="stat-value${low.length>0?' warn':''}">${low.length}</div></div>
  `;
  document.getElementById('alert-area').innerHTML=low.length>0
    ?`<div class="alert-bar"><i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0;margin-top:1px"></i><span>低在庫：${low.map(i=>i.name).join('、')}</span></div>`:'';

  const others=locations.filter(l=>l.id!==curLoc);
  const xs=document.getElementById('xfer-section');
  if(others.length===0){xs.classList.add('hidden');}
  else{
    xs.classList.remove('hidden');
    const xi=document.getElementById('xfer-item');
    const prev=xi.value;
    xi.innerHTML=curItems().length>0?curItems().map(i=>`<option value="${i.id}">${i.name}</option>`).join(''):'<option>（商品なし）</option>';
    if(curItems().find(i=>String(i.id)===prev))xi.value=prev;
    document.getElementById('xfer-to').innerHTML=others.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');
  }

  const il=document.getElementById('item-list');
  if(list.length===0){il.innerHTML=`<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px"></i>該当する商品がありません</div>`;return;}
  il.innerHTML=list.map(i=>{
    const isLow=i.qty<=i.thresh;
    return `<div class="item-card${isLow?' low-card':''}">
      <div class="item-top">
        <span class="item-name">${i.name}${isLow?` <i class="ti ti-alert-triangle" style="color:#854F0B;font-size:13px"></i>`:''}</span>
        <div class="item-actions">
          <button class="action-btn" onclick="openEdit(${i.id})"><i class="ti ti-edit"></i></button>
          <button class="action-btn" onclick="deleteItem(${i.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      <div class="item-bottom">
        <span class="badge b${i.cat}">${i.cat}</span>
        <div class="qty-ctrl">
          <button class="qb" onclick="changeQty(${i.id},-1)">−</button>
          <span class="qn${isLow?' low':''}">${i.qty}</span>
          <span class="qunit">${i.unit}</span>
          <button class="qb" onclick="changeQty(${i.id},1)">＋</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function changeQty(id,delta){
  const item=curItems().find(i=>i.id===id);
  if(item){item.qty=Math.max(0,item.qty+delta);saveSettings();render();await checkLowStock();}
}

async function doTransfer(){
  const itemId=parseInt(document.getElementById('xfer-item').value);
  const qty=Math.max(1,parseInt(document.getElementById('xfer-qty').value)||1);
  const toId=document.getElementById('xfer-to').value;
  const src=curItems().find(i=>i.id===itemId);
  if(!src){showXferMsg('商品を選択してください','err');return;}
  if(src.qty<qty){showXferMsg(`在庫不足（現在：${src.qty}${src.unit}）`,'err');return;}
  src.qty-=qty;
  if(!data[toId])data[toId]=[];
  const dst=data[toId].find(i=>i.name===src.name&&i.cat===src.cat);
  if(dst){dst.qty+=qty;}
  else{data[toId].push({id:nextItemId++,name:src.name,cat:src.cat,qty,unit:src.unit,thresh:src.thresh});}
  const toLoc=locations.find(l=>l.id===toId);
  const fromLoc=locations.find(l=>l.id===curLoc);
  showXferMsg(`${src.name} を ${qty}${src.unit} ${toLoc.name}へ移動しました`,'ok');
  if(notifSettings.xfer)await sendToChat(`[在庫管理] 拠点間移動\n${fromLoc.name} → ${toLoc.name}\n商品：${src.name}　数量：${qty}${src.unit}`);
  saveSettings();render();await checkLowStock();
}

function showXferMsg(msg,type){
  const el=document.getElementById('xfer-msg');
  el.textContent=msg;el.className='xfer-msg '+type;el.classList.remove('hidden');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.add('hidden'),3500);
}
function hideXferMsg(){const el=document.getElementById('xfer-msg');if(el)el.classList.add('hidden');}

function catOpts(sel){return CATS.map(c=>`<option${c===sel?' selected':''}>${c}</option>`).join('');}

function itemFormHTML(title,v){
  return `<h2>${title}</h2>
    <div class="field"><label>商品名</label><input type="text" id="m-name" value="${v.name||''}"></div>
    <div class="field"><label>カテゴリ</label><select id="m-cat">${catOpts(v.cat||'飲料')}</select></div>
    <div class="field"><label>在庫数</label><input type="number" id="m-qty" min="0" value="${v.qty||0}" inputmode="numeric"></div>
    <div class="field"><label>単位</label><input type="text" id="m-unit" value="${v.unit||'個'}"></div>
    <div class="field"><label>低在庫アラート閾値</label><input type="number" id="m-thresh" min="0" value="${v.thresh||5}" inputmode="numeric"></div>
    <div class="mact"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveItem()">保存</button></div>`;
}

function openAdd(){editId=null;document.getElementById('modal-inner').innerHTML=itemFormHTML('商品を追加',{});document.getElementById('modal-overlay').classList.add('show');}
function openEdit(id){editId=id;const i=curItems().find(x=>x.id===id);document.getElementById('modal-inner').innerHTML=itemFormHTML('商品を編集',i);document.getElementById('modal-overlay').classList.add('show');}
function openAddLoc(){
  document.getElementById('modal-inner').innerHTML=`
    <h2>拠点を追加</h2>
    <div class="field"><label>拠点名</label><input type="text" id="m-locname" placeholder="例：拠点C、東京倉庫"></div>
    <div class="mact"><button class="btn-cancel" onclick="closeModal()">キャンセル</button><button class="btn-save" onclick="saveLoc()">追加</button></div>`;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function overlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function saveItem(){
  const name=(document.getElementById('m-name').value||'').trim();
  if(!name){alert('商品名を入力してください');return;}
  const obj={name,cat:document.getElementById('m-cat').value,qty:Math.max(0,parseInt(document.getElementById('m-qty').value)||0),unit:document.getElementById('m-unit').value||'個',thresh:Math.max(0,parseInt(document.getElementById('m-thresh').value)||0)};
  if(editId){Object.assign(curItems().find(i=>i.id===editId),obj);}
  else{data[curLoc].push({id:nextItemId++,...obj});}
  saveSettings();closeModal();render();
}
function saveLoc(){
  const name=(document.getElementById('m-locname').value||'').trim();
  if(!name){alert('拠点名を入力してください');return;}
  const id=String.fromCharCode(nextLocCode++);
  locations.push({id,name});data[id]=[];
  saveSettings();closeModal();renderLocBar();switchLoc(id);
}
function deleteItem(id){
  if(confirm('この商品を削除しますか？')){data[curLoc]=data[curLoc].filter(i=>i.id!==id);saveSettings();render();}
}

loadSettings();
renderLocBar();
switchLoc(curLoc);
</script>
</body>
</html>
